[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Variables]
; --- PATH CONFIGURATION ---
ImgPath=X:\1 A Ongoing\33 Visionboard\
ImgPath1=#ImgPath#
ImgPath2=#ImgPath#
ImgPath3=#ImgPath#
ImgPath4=#ImgPath#
ImgPath5=#ImgPath#
ImgPath6=#ImgPath#
ImgPath7=#ImgPath#

Subfolders=1
UpdateDiv=120

; --- WINDOWS 11 GLASS v8.7 TOKENS ---
ColorSurface=20,20,20,225
ColorCardRest=255,255,255,20
ColorCardHover=255,255,255,45
ColorAccent=0,220,255
ColorOnSurface=255,255,255
Radius=28
Padding=4

; Glass Highlights
ColorGlassBorder=255,255,255,50
ColorGlassBorderHover=255,255,255,100

; Dynamic Variable for ToolTips (Set by Lua)
Name1=Loading...
Name2=Loading...
Name3=Loading...
Name4=Loading...
Name5=Loading...
Name6=Loading...
Name7=Loading...

; =====================
; MEASURES
; =====================

[MeasureImage1]
Measure=Plugin
Plugin=QuotePlugin
PathName=#ImgPath1#
Subfolders=#Subfolders#
FileFilter=*.jpg;*.jpeg;*.png;*.bmp;*.gif
UpdateDivider=#UpdateDiv#
OnChangeAction=[!CommandMeasure MeasureLua "CheckUnique(1)"]

[MeasureImage2]
Measure=Plugin
Plugin=QuotePlugin
PathName=#ImgPath2#
Subfolders=#Subfolders#
FileFilter=*.jpg;*.jpeg;*.png;*.bmp;*.gif
UpdateDivider=#UpdateDiv#
OnChangeAction=[!CommandMeasure MeasureLua "CheckUnique(2)"]

