[MeasureLua]
Measure=Script
ScriptFile=visionboard.lua

; =====================
; STYLES
; =====================

[StyleImage]
PreserveAspectRatio=2
SolidColor=0,0,0,1
DynamicVariables=1
Group=Slots

[StyleArrow]
FontFace=Segoe UI Light
FontSize=10
FontColor=255,255,255,180
StringStyle=BOLD
StringAlign=CenterCenter
AntiAlias=1
DynamicVariables=1
Group=Arrows
Hidden=1
W=24
H=24

[StyleArrowBg]
Shape=Ellipse 12,12,12 | Fill Color 255,255,255,50 | StrokeWidth 1 | Stroke Color 255,255,255,100
W=24
H=24
Group=Arrows
Hidden=1
DynamicVariables=1

; =====================
; METERS
; =====================

[MeterBackdrop]
Meter=Shape
Shape=Rectangle 0,0,595,620,#Radius# | Fill Color #ColorSurface# | StrokeWidth 0.5 | Stroke Color 255,255,255,30
X=0
Y=0
DynamicVariables=1

; --- SLOT 1 (25% Area Aspect) ---
[Slot1Background]
Meter=Shape
Shape=Rectangle 0,0,335,295,#Radius# | Fill Color #ColorCardRest# | StrokeWidth 1 | Stroke Color #ColorGlassBorder#
X=10
Y=10
DynamicVariables=1

[Slot1Container]
Meter=Shape
Shape=Rectangle #Padding#,#Padding#,(335-(#Padding#*2)),(295-(#Padding#*2)),(#Radius#-#Padding#) | Fill Color 255,255,255,255 | StrokeWidth 0
X=10
Y=10
DynamicVariables=1

[MeterImage1]
Meter=Image
MeasureName=MeasureImage1
MeterStyle=StyleImage
W=335
H=295
Container=Slot1Container
ToolTipText=#Name1#
ToolTipType=0
MouseOverAction=[!SetOption Slot1Background Shape "Rectangle 0,0,335,295,#Radius# | Fill Color #ColorCardHover# | StrokeWidth 1.5 | Stroke Color #ColorGlassBorderHover#"][!ShowMeterGroup Slot1Arrows][!Redraw]
MouseLeaveAction=[!SetOption Slot1Background Shape "Rectangle 0,0,335,295,#Radius# | Fill Color #ColorCardRest# | StrokeWidth 1 | Stroke Color #ColorGlassBorder#"][!HideMeterGroup Slot1Arrows][!Redraw]

[MeterNext1Bg]
Meter=Shape
MeterStyle=StyleArrowBg
Group=Arrows | Slot1Arrows
X=310
Y=270

[MeterNext1]
Meter=String
MeterStyle=StyleArrow
Group=Arrows | Slot1Arrows
X=322
Y=282
Text=>
LeftMouseUpAction=[!UpdateMeasure MeasureImage1][!UpdateMeter MeterImage1][!Redraw]

